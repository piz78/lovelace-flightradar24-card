name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2024.11.0"
    validations:
      required: true
  - type: input
    id: card-version
    attributes:
      label: FlightRadar24 Card version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Card configuration (YAML)
      render: yaml
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Browser console errors
      description: Open the browser developer tools (F12) and paste any errors here.
      render: shell
