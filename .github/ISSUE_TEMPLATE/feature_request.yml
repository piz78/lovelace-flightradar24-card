name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like to see added.
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Why would this be useful? How would you use it?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried?
